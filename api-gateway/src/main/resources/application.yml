spring:
  application:
    name: api-gateway
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      connect-timeout: 2000
      timeout: 2000
  cloud:
    gateway:
      # Routes are defined programmatically in GatewayConfig.java
      default-filters:
        # Remove duplicate CORS headers added by both gateway and upstream services
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_UNIQUE

server:
  port: 8080

app:
  services:
    order-service-url: ${ORDER_SERVICE_URL:http://localhost:8081}
  # Comma-separated list of valid API keys.
  # In production: load from AWS Secrets Manager via Spring Cloud AWS.
  api-keys: ${API_KEYS:dev-key-1,dev-key-2}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

otel:
  exporter:
    otlp:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}
  resource:
    attributes:
      service.name: api-gateway

logging:
  level:
    com.orderflow: ${LOG_LEVEL:INFO}
    org.springframework.cloud.gateway: INFO

---
spring:
  config:
    activate:
      on-profile: local
  data:
    redis:
      host: localhost

logging:
  level:
    com.orderflow: DEBUG
    org.springframework.cloud.gateway: DEBUG
