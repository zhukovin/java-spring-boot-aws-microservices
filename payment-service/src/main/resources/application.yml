spring:
  application:
    name: payment-service
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: payment-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.orderflow.*"
        spring.json.use.type.headers: "false"
        spring.json.value.default.type: com.orderflow.common.events.InventoryReservedEvent

server:
  port: 8080

app:
  kafka:
    topics:
      inventory-events: ${INVENTORY_EVENTS_TOPIC:inventory.events}
      payment-events: ${PAYMENT_EVENTS_TOPIC:payment.events}

# ── Resilience4j ──────────────────────────────────────────────────────────────
resilience4j:
  circuitbreaker:
    instances:
      payment:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
        registerHealthIndicator: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

otel:
  exporter:
    otlp:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}
  resource:
    attributes:
      service.name: payment-service

logging:
  level:
    com.orderflow: ${LOG_LEVEL:INFO}

---
spring:
  config:
    activate:
      on-profile: local
  kafka:
    bootstrap-servers: localhost:9092

logging:
  level:
    com.orderflow: DEBUG
