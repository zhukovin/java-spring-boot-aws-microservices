# OrderFlow local development stack
# Usage: docker compose up --build
#
# Ports exposed to host:
#   8080 → api-gateway          (entry point for all API calls)
#   8081 → order-service        (direct access for debugging)
#   8082 → inventory-service    (direct access for debugging)
#   8083 → payment-service      (direct access for debugging)
#   8000 → dynamodb-local
#   8001 → dynamodb-admin UI    http://localhost:8001
#   8090 → kafka-ui             http://localhost:8090
#   9092 → kafka                (external listener for local producers)
#   6379 → redis

services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      # Only 'srvr' is whitelisted by default in cp-zookeeper; grep for 'Mode' in its output
      test: ["CMD-SHELL", "echo srvr | nc -w 2 localhost 2181 | grep -q Mode"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [orderflow]

  kafka:
    image: confluentinc/cp-kafka:7.7.1
    hostname: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # Bind on all interfaces; advertise kafka:29092 for inter-container
      # traffic and localhost:9092 for host-machine access
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 1
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9092"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s
    networks: [orderflow]

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    networks: [orderflow]

  dynamodb-local:
    image: amazon/dynamodb-local:2.5.2
    ports:
      - "8000:8000"
    # -sharedDb: single DB file; -inMemory: lost on restart (fine for local dev)
    command: "-jar DynamoDBLocal.jar -sharedDb -inMemory"
    healthcheck:
      # curl exits 0 on any HTTP response (incl. 400); only fails if the server is unreachable
      test: ["CMD-SHELL", "curl -s http://localhost:8000/ > /dev/null 2>&1"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [orderflow]

  dynamodb-admin:
    image: aaronshaf/dynamodb-admin:latest
    depends_on:
      dynamodb-local:
        condition: service_healthy
    ports:
      - "8001:8001"
    environment:
      DYNAMO_ENDPOINT: http://dynamodb-local:8000
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      AWS_REGION: us-east-1
    networks: [orderflow]

  # One-shot init container: creates all DynamoDB tables and seeds inventory.
  # Application services declare `condition: service_completed_successfully`
  # so they wait for this to finish before starting.
  dynamodb-init:
    image: amazon/aws-cli:latest
    restart: "no"
    depends_on:
      dynamodb-local:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      AWS_DEFAULT_REGION: us-east-1
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        E=http://dynamodb-local:8000

        echo "==> Creating orders table (GSI: GSI_CustomerOrders)..."
        aws dynamodb create-table --endpoint-url http://dynamodb-local:8000 \
          --table-name orders \
          --attribute-definitions \
            AttributeName=PK,AttributeType=S \
            AttributeName=SK,AttributeType=S \
            AttributeName=customerId,AttributeType=S \
            AttributeName=createdAt,AttributeType=S \
          --key-schema \
            AttributeName=PK,KeyType=HASH \
            AttributeName=SK,KeyType=RANGE \
          --billing-mode PAY_PER_REQUEST \
          --global-secondary-indexes \
            '[{"IndexName":"GSI_CustomerOrders","KeySchema":[{"AttributeName":"customerId","KeyType":"HASH"},{"AttributeName":"createdAt","KeyType":"RANGE"}],"Projection":{"ProjectionType":"ALL"}}]' \
          || echo "  [orders] already exists, skipping"

        echo "==> Creating order_idempotency_keys table..."
        aws dynamodb create-table --endpoint-url http://dynamodb-local:8000 \
          --table-name order_idempotency_keys \
          --attribute-definitions AttributeName=PK,AttributeType=S \
          --key-schema AttributeName=PK,KeyType=HASH \
          --billing-mode PAY_PER_REQUEST \
          || echo "  [order_idempotency_keys] already exists, skipping"

        echo "==> Creating order_outbox table (GSI: GSI_PendingOutbox)..."
        aws dynamodb create-table --endpoint-url http://dynamodb-local:8000 \
          --table-name order_outbox \
          --attribute-definitions \
            AttributeName=PK,AttributeType=S \
            AttributeName=status,AttributeType=S \
            AttributeName=createdAt,AttributeType=S \
          --key-schema AttributeName=PK,KeyType=HASH \
          --billing-mode PAY_PER_REQUEST \
          --global-secondary-indexes \
            '[{"IndexName":"GSI_PendingOutbox","KeySchema":[{"AttributeName":"status","KeyType":"HASH"},{"AttributeName":"createdAt","KeyType":"RANGE"}],"Projection":{"ProjectionType":"ALL"}}]' \
          || echo "  [order_outbox] already exists, skipping"

        echo "==> Creating inventory table..."
        aws dynamodb create-table --endpoint-url http://dynamodb-local:8000 \
          --table-name inventory \
          --attribute-definitions AttributeName=PK,AttributeType=S \
          --key-schema AttributeName=PK,KeyType=HASH \
          --billing-mode PAY_PER_REQUEST \
          || echo "  [inventory] already exists, skipping"

        echo "==> Creating inventory_idempotency table..."
        aws dynamodb create-table --endpoint-url http://dynamodb-local:8000 \
          --table-name inventory_idempotency \
          --attribute-definitions AttributeName=PK,AttributeType=S \
          --key-schema AttributeName=PK,KeyType=HASH \
          --billing-mode PAY_PER_REQUEST \
          || echo "  [inventory_idempotency] already exists, skipping"

        echo "==> Seeding inventory data..."
        aws dynamodb put-item --endpoint-url http://dynamodb-local:8000 \
          --table-name inventory \
          --item '{"PK":{"S":"ITEM#SKU-001"},"skuId":{"S":"SKU-001"},"productName":{"S":"Widget Pro"},"availableQty":{"N":"100"},"reservedQty":{"N":"0"},"version":{"N":"0"}}'

        aws dynamodb put-item --endpoint-url http://dynamodb-local:8000 \
          --table-name inventory \
          --item '{"PK":{"S":"ITEM#SKU-002"},"skuId":{"S":"SKU-002"},"productName":{"S":"Gadget Plus"},"availableQty":{"N":"50"},"reservedQty":{"N":"0"},"version":{"N":"0"}}'

        aws dynamodb put-item --endpoint-url http://dynamodb-local:8000 \
          --table-name inventory \
          --item '{"PK":{"S":"ITEM#SKU-003"},"skuId":{"S":"SKU-003"},"productName":{"S":"Super Cable"},"availableQty":{"N":"200"},"reservedQty":{"N":"0"},"version":{"N":"0"}}'

        echo "==> All DynamoDB tables created and inventory seeded."
    networks: [orderflow]

  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks: [orderflow]

  # ── Application Services ─────────────────────────────────────────────────────

  order-service:
    build:
      context: .
      dockerfile: order-service/Dockerfile
    ports:
      - "8081:8080"
    environment:
      SPRING_PROFILES_ACTIVE: local
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      DYNAMODB_ENDPOINT: http://dynamodb-local:8000
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      AWS_REGION: us-east-1
      LOG_LEVEL: DEBUG
    depends_on:
      kafka:
        condition: service_healthy
      dynamodb-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q UP || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    networks: [orderflow]

  inventory-service:
    build:
      context: .
      dockerfile: inventory-service/Dockerfile
    ports:
      - "8082:8080"
    environment:
      SPRING_PROFILES_ACTIVE: local
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      DYNAMODB_ENDPOINT: http://dynamodb-local:8000
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      AWS_REGION: us-east-1
      LOG_LEVEL: DEBUG
    depends_on:
      kafka:
        condition: service_healthy
      dynamodb-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q UP || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    networks: [orderflow]

  payment-service:
    build:
      context: .
      dockerfile: payment-service/Dockerfile
    ports:
      - "8083:8080"
    environment:
      SPRING_PROFILES_ACTIVE: local
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      LOG_LEVEL: DEBUG
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q UP || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    networks: [orderflow]

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: local
      REDIS_HOST: redis
      ORDER_SERVICE_URL: http://order-service:8080
      API_KEYS: dev-key-1,dev-key-2
      LOG_LEVEL: DEBUG
    depends_on:
      order-service:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q UP || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks: [orderflow]

networks:
  orderflow:
    driver: bridge
